<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Under Construction - Keylington Enterprises LLC</title>

<!-- Corporate font -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        background: linear-gradient(135deg, #003973, #E5E5BE);
        background-size: 300% 300%;
        animation: gradientMove 12s ease infinite;
        color: #ffffff;
        font-family: 'Inter', sans-serif;
        text-align: center;
        padding: 20px;
    }

    @keyframes gradientMove {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    .card {
        background: rgba(0, 0, 0, 0.35);
        padding: 50px 60px;
        border-radius: 18px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        backdrop-filter: blur(10px);
        box-shadow: 0 0 40px rgba(0,0,0,0.4);
        max-width: 420px;
        animation: fadeIn 1.2s ease forwards;
        opacity: 0;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    img {
        width: 110px;
        margin-bottom: 25px;
        opacity: 0.95;
    }

    h1 {
        font-size: 30px;
        font-weight: 700;
        margin-bottom: 8px;
        letter-spacing: 0.5px;
    }

    h2 {
        font-size: 18px;
        font-weight: 400;
        opacity: 0.9;
        margin-bottom: 18px;
    }

    p {
        font-size: 16px;
        opacity: 0.85;
        line-height: 1.4;
    }
</style>
</head>

<body>
    <div class="card">
        <img src="https://cdn-icons-png.flaticon.com/512/992/992651.png" alt="Under Construction">
        <h1>Under Construction</h1>
        <h2>Keylington Enterprises LLC</h2>
        <p>We are currently building a new corporate experience.</p>
    </div>
</body>
</html>
