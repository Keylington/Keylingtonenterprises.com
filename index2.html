<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Keylington E. Zamora López</title>

<!-- Fuente elegante y moderna -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: 'Poppins', sans-serif;
        background: linear-gradient(135deg, #0d0d0d, #1a1a1a, #2b2b2b);
        background-size: 300% 300%;
        animation: gradientMove 12s ease infinite;
        color: white;
    }

    @keyframes gradientMove {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    .card {
        padding: 50px 70px;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.06);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.15);
        text-align: center;
        box-shadow: 0 0 40px rgba(0, 0, 0, 0.4);
        animation: fadeIn 1.2s ease forwards;
        opacity: 0;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    h1 {
        font-size: 46px;
        font-weight: 700;
        letter-spacing: 1.5px;
        margin-bottom: 10px;
    }

    h2 {
        font-size: 22px;
        font-weight: 300;
        opacity: 0.85;
        letter-spacing: 1px;
    }

    .shine {
        position: absolute;
        top: -80px;
        left: -80px;
        width: 160px;
        height: 160px;
        background: radial-gradient(circle, rgba(255,255,255,0.15), transparent 70%);
        filter: blur(40px);
        animation: shineMove 10s infinite linear;
    }

    @keyframes shineMove {
        0% { transform: translate(0,0); }
        50% { transform: translate(200px, 200px); }
        100% { transform: translate(0,0); }
    }
</style>
</head>

<body>
    <div class="card">
        <div class="shine"></div>
        <h1>Keylington E. Zamora López</h1>
        <h2>Keylington Enterprises LLC</h2>
    </div>
</body>
</html>
